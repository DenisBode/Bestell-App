<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellapp</title>

    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/basket.css">
</head>

<body>

    <header class="main-header">

        <div class="header-content">

            <div class="header-logo">
                <img src="./assets/icons/logoBestellapp.svg" alt="Bestellapp Logo">
            </div>

            <button class="menu-button" aria-label="Menü öffnen">
                ☰
            </button>

        </div>

    </header>

    <main>

        <section class="hero-section">

            <img src="./assets/img/header_img.jpg" alt="Burger, Pizza und Salat" class="hero-image">

            <div class="profile-image-container">
                <img src="./assets/icons/hero_burger_round.png" alt="BurgerHouse Logo" class="hero-icon-image">
            </div>

        </section>

        <section class="restaurant-info">

            <h1>BurgerHouse</h1>

            <p>
                The best of Burgers, Pizza and Greens,
                all in one great place.
            </p>

        </section>

        <div class="content-wrapper">

            <section class="menu-section">

                <section class="food-category">
                    <div class="category-icon">
                        <img src="./assets/icons/BurgerSectionIcn.png" alt="Burger Icon">
                    </div>

                    <h2>Burger & Sandwiches</h2>
                </section>

                <div id="burgerContent"></div>

                <section class="food-category">
                    <div class="category-icon">
                        <img src="./assets/icons/PizzaSectionIcn.png" alt="Pizza Icon">
                    </div>

                    <h2>Pizza</h2>
                </section>

                <div id="pizzaContent"></div>

                <section class="food-category">
                    <div class="category-icon">
                        <img src="./assets/icons/SaladSectionIcn.png" alt="Salat Icon">
                    </div>

                    <h2>Salate</h2>
                </section>

                <div id="saladContent"></div>

            </section>

            <aside class="cart-section">

                <h2>Warenkorb</h2>

                <div id="cartContent"></div>

            </aside>

        </div>

    </main>

    <footer class="main-footer">
        <div class="footer-content">

            <span>© 2025 BurgerHouse</span>

            <a href="impressum.html">Impressum</a>
            <a href="datenschutz.html">Datenschutz</a>

            <a href="#">Cookie-Einstellungen</a>

        </div>
    </footer>

    <div id="modalContainer"></div>

    <script src="./scripts/db.js"></script>
    <script src="./scripts/templates.js"></script>
    <script src="./scripts/foodCards.js"></script>
    <script src="./scripts/basket.js"></script>
    <script src="./scripts/script.js"></script>

</body>

</html>
